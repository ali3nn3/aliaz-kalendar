name: Obnovit Kalendar

on:
  schedule:
    # Spustí se každou hodinu (v 0. minutu)
    # Pozor: GitHub Actions mohou mít zpoždění 5-10 minut.
    - cron: '0 * * * *'
  # Umožní spustit akci ručně tlačítkem na GitHubu (pro testování)
  workflow_dispatch:

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    # Důležité: Povolíme akci zapisovat do repozitáře (commitovat obrázek)
    permissions:
      contents: write

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavit Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Nainstalovat závislosti (Playwright)
        run: |
          pip install -r requirements.txt
          # Playwright potřebuje doinstalovat vlastní jádro prohlížeče
          playwright install chromium --with-deps

      - name: Spustit screenshot skript
        run: python screenshot.py
        
      - name: Otočit a změnit velikost obrázku (800x600)
        run: |
          # Nainštalujeme ImageMagick (pre istotu, ak by chýbal)
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          # rotate 90 = otočenie o 90° doprava
          # resize 1026x760! = vynútený rozmer (križik zabezpečí ignorovanie pomeru strán)
          convert kalendar.png -resize 1026x760! -rotate 90 kalendar.png
          
      - name: Commitovat a pushnout obrázek
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Vynutíme přidání souboru
          git add -f kalendar.png
          
          # Zkusíme commitnout. Pokud nejsou změny, skript neselže (díky || exit 0)
          git commit -m "Automatická obnova kalendáře [$(date)]" || exit 0
          
          # Pushneme změny
          git push origin main
